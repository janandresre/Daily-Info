# This is a basic workflow to help you get started with Actions
name: Daily Discord Message
on:
  schedule:
    - cron: '0 9 * * *' # Täglich um 09:00 UTC
  workflow_dispatch: # Erlaubt manuelles Starten zum Testen

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests #requirements.txt kann man erstellen, wenn es zu viel wird
      - name: Run script
        env:
          # Hier wird das GitHub-Secret in eine Umgebungsvariable geladen
          MY_DISCORD: ${{ secrets.MY_DISCORD }}
        run: daily_info_script.py
